general {
    ignore_empty_input = true
    hide_cursor = true
}

background {
    monitor =
    path = /home/zync/.config/themes/tokyo-night/wallpapers/faceless.png
    color = 0xff1a1111
    blur_passes = 3
}

animations {
    enabled = true
}

input-field {
    monitor =
    size = 650, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = 0xff1a1111
    outer_color = 0xffffb3b0
    font_color = 0xfff0dedd

    outline_thickness = 4
    font_family = JetBrainsMono Nerd Font

    placeholder_text = Enter Password
    check_color = 0xffffb3b0
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}

auth {
    fingerprint:enabled = false
}
