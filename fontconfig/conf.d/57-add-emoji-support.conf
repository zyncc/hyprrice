<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <match target="font">
    <test name="family" compare="eq">
      <string>Noto Sans</string>
    </test>
    <edit name="charset" mode="assign">
      <minus>
        <name>charset</name>
        <charset>
          <range>
            <int>0x1F300</int>
            <int>0x1FAFF</int>
          </range>
          <range>
            <int>0x2600</int>
            <int>0x27BF</int>
          </range>
        </charset>
      </minus>
    </edit>
  </match>

</fontconfig>
