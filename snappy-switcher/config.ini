# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║                     SNAPPY SWITCHER CONFIGURATION                         ║
# ║                           v4.0.0 Stable Release                           ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
#
# This file controls all aspects of the Snappy Switcher window switcher.
# Copy this file to: ~/.config/snappy-switcher/config.ini
#
# Run: snappy-switcher --daemon  to start the daemon
# Run: snappy-switcher next      to cycle windows
#
# ═══════════════════════════════════════════════════════════════════════════

# ┌───────────────────────────────────────────────────────────────────────────┐
# │                              GENERAL SETTINGS                             │
# └───────────────────────────────────────────────────────────────────────────┘
[general]

# View Mode: How windows are displayed
#   overview = Show all windows individually (simple)
#   context  = Group tiled windows by workspace+app (power user)
mode = overview

# The panel position whether to follow the focus of your monitor
follow_monitor = true

# Show workspace ID badge on each card (e.g. [3], [F:3] for floating)
show_workspace_badge = true

# Sticky Mode: Retain focus on the currently active window when opening the switcher
# true  = Open switcher but keep current window selected (index 0)
# false = Immediately jump to the previous window (index 1)
sticky_mode = false

# ┌───────────────────────────────────────────────────────────────────────────┐
# │                              THEME SETTINGS                               │
# └───────────────────────────────────────────────────────────────────────────┘
[theme]

# Theme file to load (searched in ~/.config/snappy-switcher/themes/ first,
# then /usr/share/snappy-switcher/themes/)

# Available themes:
#   snappy-slate.ini      - Default dark theme (Catppuccin-inspired)
#   catppuccin-mocha.ini  - Catppuccin Mocha
#   catppuccin-latte.ini  - Catppuccin Latte (light)
#   catppuccin-frappe.ini - Catppuccin Frappe
#   cyberpunk.ini         - Cyberpunk theme
#   nord.ini              - Nord color scheme
#   nordic.ini            - Nordic color scheme
#   dracula.ini           - Dracula theme
#   rose-pine.ini         - Rosé Pine theme
#   gruvbox-dark.ini      - Gruvbox Dark
#   grovestorm.ini        - Gruvbox + Evergreen theme
#   tokyo-night.ini       - Tokyo Night
#   liquid-glassW.ini     - Liquid Glass White (frosted acrylic, needs blur)
#   liquid-glassB.ini     - Liquid Glass Black (smoked glass, needs blur)
#   stormlight.ini        - A Lighting Quick Yellow  (Catppuccin-inspired)
name = snappy-slate.ini

# Override specific theme colors here (optional)
# These will be applied AFTER the theme file is loaded
# Uncomment and modify to customize:
#
# background = #1e1e2eff
# card_bg = #313244ff
# card_selected = #45475aff
# text_color = #cdd6f4ff
# subtext_color = #a6adc8ff
# border_color = #89b4faff
#
# Granular UI element colors (all support 8-char #RRGGBBAA for transparency)
# bundle_bg = #313244ff        # Context-mode stacked card background
# badge_bg = #89b4faff         # Group count badge circle
# badge_text_color = #cdd6f4ff # Group count badge number

# Border and corner styling
border_width = 2
corner_radius = 15

# ┌───────────────────────────────────────────────────────────────────────────┐
# │                              LAYOUT SETTINGS                              │
# └───────────────────────────────────────────────────────────────────────────┘
[layout]

# Card dimensions (pixels)
card_width = 145
card_height = 135

# Spacing
card_gap = 10
padding = 10

# Grid layout
max_cols = 5

# Icon settings
icon_size = 57
icon_radius = 15

error_width = 480        # Banner width in pixels (default: 480)
error_height = 160       # Banner height in pixels (default: 160)
error_font_size = 13     # Main error text size (default: 13)


# ┌───────────────────────────────────────────────────────────────────────────┐
# │                              ICON SETTINGS                                │
# └───────────────────────────────────────────────────────────────────────────┘
[icons]

# Icon theme name (from ~/.icons/ or /usr/share/icons/)
# Popular themes: Papirus, Tela, Numix, Adwaita, hicolor
theme = Adwaita

# Fallback icon theme if primary theme doesn't have the icon
fallback = hicolor

# Show letter fallback when no icon is found
# true  = Show colored circle with first letter of app name
# false = Show nothing
show_letter_fallback = true

# ┌───────────────────────────────────────────────────────────────────────────┐
# │                              FONT SETTINGS                                │
# └───────────────────────────────────────────────────────────────────────────┘
[font]

# Font family for all text
# Examples: Sans, Inter, Roboto, JetBrainsMono Nerd Font,  FiraCode Nerd Font etc... 
family = Sans 

# Font weight: Normal, Bold, Light, Medium, SemiBold
weight = Bold

# Title text size (pixels)
title_size = 10

# Letter icon size (for fallback icons)
icon_letter_size = 24

# ═══════════════════════════════════════════════════════════════════════════
# END OF CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════
